name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare artifacts folder
        run: |
          mkdir -p artifacts
          touch artifacts/shop-baseline-check.log

      - name: Guard imports
        run: npm run guard:imports

      - name: Build core + Haas profile packages
        run: |
          npm run --workspace @cnc/core build
          npm run --workspace @cnc/profile-haas-ngc build

      - name: Core tests
        run: npm run test

      - name: Shop baseline drift check (capture log)
        run: |
          npm run check:shop-baselines 2>&1 | tee artifacts/shop-baseline-check.log

      - name: Upload shop baseline check log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: shop-baseline-check-log
          path: artifacts/shop-baseline-check.log
          if-no-files-found: warn

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  desktop-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core + Haas profile packages
        run: |
          npm run --workspace @cnc/core build
          npm run --workspace @cnc/profile-haas-ngc build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Print Playwright and browser versions
        run: |
          npx playwright --version
          npx playwright install --list

      - name: Run desktop E2E
        run: npm run --workspace @cnc/desktop e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: desktop-e2e-playwright-artifacts
          path: |
            apps/desktop/test-results
            apps/desktop/playwright-report
          if-no-files-found: warn

      - name: Add desktop E2E gate snapshot to job summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run e2e:gate:report -- --limit=10 --github-summary >> "$GITHUB_STEP_SUMMARY"
